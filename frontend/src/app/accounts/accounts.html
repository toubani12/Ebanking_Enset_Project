<div class="container mt-4">
  <div class="row">
    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-header bg-primary text-white">Accounts</div>
        <div class="card-body">
          <form [formGroup]="searchFormGroup" (ngSubmit)="onSearchSubmit()">
            <div class="input-group mb-3">
              <label class="input-group-text">Account ID:</label>
              <input type="text" formControlName="accountId" class="form-control" placeholder="Search account..." />
              <button type="submit" class="btn btn-outline-primary" [disabled]="!searchFormGroup.valid">
                <i class="bi bi-search"></i> Search
              </button>
            </div>
          </form>

          <ng-container *ngIf="accountDetails">
            <div class="mb-3">
              <label><strong>Account ID:</strong></label>
              <span> {{ accountDetails.accountId }}</span>
            </div>
            <div class="mb-3">
              <label><strong>Balance:</strong></label>
              <span> {{ accountDetails.balance | number: '1.2-2' }}</span>
            </div>

            <table class="table table-striped">
              <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let op of accountDetails.accountOperationDtos">
                <td>{{ op.id }}</td>
                <td>{{ op.operationDate | date: 'medium' }}</td>
                <td>
                    <span [ngClass]="op.type === 'DEBIT' ? 'badge bg-danger' : 'badge bg-success'">
                        {{ op.type }}
                    </span>
                </td>
                <td class="text-end">{{ op.amount | number: '1.2-2' }}</td>
              </tr>
              </tbody>
            </table>

            <ul class="pagination">
              <li *ngFor="let item of pages; let page = index"
                  [ngClass]="page === currentPage ? 'page-item active' : 'page-item'">
                <a class="page-link" href="javascript:void(0);" (click)="gotoPage($event, page)" style="cursor: pointer;">{{ page + 1 }}</a>
              </li>
            </ul>
          </ng-container>

          <div *ngIf="errorMessage" class="alert alert-danger mt-3">
            {{ errorMessage }}
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6" *ngIf="accountDetails && authService.roles && authService.roles.includes('ADMIN')">
      <div class="card">
        <div class="card-header bg-success text-white">Operations</div>
        <div class="card-body">
          <form [formGroup]="operationFromGroup" (ngSubmit)="handleAccountOperation()">
            <div class="form-check form-check-inline mb-3">
              <input class="form-check-input" type="radio" formControlName="operationType" value="DEBIT" id="debitRadio">
              <label class="form-check-label" for="debitRadio">Debit</label>
            </div>
            <div class="form-check form-check-inline mb-3">
              <input class="form-check-input" type="radio" formControlName="operationType" value="CREDIT" id="creditRadio">
              <label class="form-check-label" for="creditRadio">Credit</label>
            </div>
            <div class="form-check form-check-inline mb-3">
              <input class="form-check-input" type="radio" formControlName="operationType" value="TRANSFER" id="transferRadio">
              <label class="form-check-label" for="transferRadio">Transfer</label>
            </div>

            <div class="mb-3" *ngIf="operationFromGroup.value.operationType === 'TRANSFER'">
              <label class="form-label">Account Destination:</label>
              <input type="text" formControlName="accountDestination" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Amount:</label>
              <input type="number" formControlName="amount" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Description:</label>
              <input type="text" formControlName="description" class="form-control" />
            </div>

            <div class="d-grid">
              <button class="btn btn-success" [disabled]="!operationFromGroup.valid">Save Operation</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
